<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primera Parte Terminada</title>
  <style>
    /* Variables de diseño */
    :root {
      --blue: #031795;
      --green: #0a8a5a;
      --muted: rgba(3, 23, 149, 0.72);
      --border: rgba(42, 131, 223, 0.18);
      --font: 'AASmartSans', 'Barlow', system-ui, sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: #f7fbff;
      color: var(--blue);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .layout-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 1200px;
      height: 80vh;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(3, 23, 149, 0.1);
      padding: 2.5rem;
      overflow: hidden;
    }

    .mensaje-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 1rem;
      animation: fadeUp 0.6s ease forwards;
    }

    .mensaje-col h1 {
      font-size: clamp(28px, 4vw, 42px);
      margin-bottom: 1rem;
      color: var(--blue);
      line-height: 1.1;
    }

    .mensaje-col p {
      font-size: clamp(15px, 1.5vw, 18px);
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(10, 138, 90, 0.1);
      color: var(--green);
      border: 1px solid rgba(10, 138, 90, 0.22);
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 700;
      width: fit-content;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .iframe-col {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(236,244,255,0.92));
      box-shadow: 0 8px 24px rgba(3, 23, 149, 0.08);
      animation: fadeUp 0.6s ease forwards 0.2s;
      opacity: 0;
    }

    .iframe-col iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 820px) {
      .layout-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: 95vh;
        padding: 1.5rem;
        gap: 1.5rem;
      }
      .mensaje-col {
        padding-right: 0;
        text-align: center;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="layout-container">
    <div class="mensaje-col">
      <div class="badge">✓ Fase 1 Completada</div>
      <h1>¡Has terminado la primera parte!</h1>
      <p>Avanza a la siguiente etapa revisando el contenido interactivo en el panel de la derecha.</p>
    </div>

    <div class="iframe-col">
      <iframe id="miIframe" src="../Epp/Epp.html" title="Contenido de la siguiente parte" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const iframe = document.getElementById("miIframe");

    
      iframe.addEventListener("load", () => {
        try {

          const iframeWindow = iframe.contentWindow;

          if (typeof iframeWindow.aparecerObj === "function") {
            iframeWindow.aparecerObj();
          } else {
            console.warn("La función aparecerObj() no está definida en el iframe.");
          }


          if (iframeWindow.v3d && iframeWindow.v3d.puzzles && iframeWindow.v3d.puzzles.procedures) {
            iframeWindow.v3d.puzzles.procedures["bloqueador"]();
          } else {
            console.warn("El objeto v3d o el puzzle 'bloqueador' no están disponibles en el iframe.");
          }

        } catch (error) {

          console.error("Error al intentar ejecutar las funciones en el iframe:", error);
        }
      });
    });
  </script>

</body>
</html>
