<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargador 3D con Precarga en Capas</title>
    <style>
        html, body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: transparent;
        }

        #contenedor-iframes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .capa-html {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            opacity: 0; 
            z-index: -1;
            transition: opacity 0.5s ease-in-out; 
        }

        .capa-activa {
            opacity: 1;
            z-index: 10; 
        }
    </style>
</head>
<body>

    <div id="contenedor-iframes"></div>

    <script>
        let listaHtml = [];
        let indiceActual = 0;
        const iframesCreados = {}; 
        
        const contenedor = document.getElementById('contenedor-iframes');

        async function cargarConfiguracion() {
            try {
                const respuesta = await fetch('./Recursos/list/html.json');
                if (!respuesta.ok) throw new Error("No se pudo cargar html.json");
                
                listaHtml = await respuesta.json();
                
                if (listaHtml.length > 0) {
                    crearCapa(indiceActual, true);
                    crearCapa(indiceActual + 1, false);
                }
            } catch (error) {
                console.error("Error al cargar JSON", error);
            }
        }

        function crearCapa(indice, hacerActiva) {
            // Se añade validación para evitar índices negativos
            if (indice < 0 || indice >= listaHtml.length) return;

            const url = listaHtml[indice];

            if (iframesCreados[indice]) {
                return;
            }

            const nuevoIframe = document.createElement('iframe');
            nuevoIframe.src = url;
            nuevoIframe.className = 'capa-html';
            
            if (hacerActiva) {
                nuevoIframe.classList.add('capa-activa');
            }

            contenedor.appendChild(nuevoIframe);
            iframesCreados[indice] = nuevoIframe;
        }

        function mostrarCapa(indice) {
            Object.values(iframesCreados).forEach(iframe => {
                iframe.classList.remove('capa-activa');
            });

            if (iframesCreados[indice]) {
                iframesCreados[indice].classList.add('capa-activa');
            }
        }

        // Función para avanzar
        window.siguientehtml = function() {
            if (indiceActual < listaHtml.length - 1) {
                indiceActual++;
                
                mostrarCapa(indiceActual);
                crearCapa(indiceActual + 1, false);
            }
        };

        // Función nueva para retroceder
        window.retrocederhtml = function() {
            if (indiceActual > 0) {
                indiceActual--;
                
                mostrarCapa(indiceActual);
                // Aunque al retroceder la capa anterior probablemente ya esté creada,
                // llamamos a crearCapa por si acaso se necesita precargar un salto largo.
                crearCapa(indiceActual - 1, false);
            }
        };

        cargarConfiguracion();

    </script>
</body>
</html>
